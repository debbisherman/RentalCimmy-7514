---
deployment:
  tasks:
    # FIXED: Added the mandatory space after the dash and before 'export'
    - export DEPLOYPATH=/home/$(whoami)/public_html/
    
    # 1. Copy all built assets from the dist folder to public_html
    - /bin/cp -R dist/* $DEPLOYPATH
    
    # 2. Explicitly copy .htaccess from dist to the root (Vite puts it in dist)
    - /bin/cp dist/.htaccess $DEPLOYPATH.htaccess
    
    # 3. Log the deployment for troubleshooting
    - echo "Deployment successful on $(date)" >> $DEPLOYPATH/deploy_history.txt