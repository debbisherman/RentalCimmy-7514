---
deployment:
  tasks:
    # 1. Define the deployment path (Fixed syntax: space after dash)
    - export DEPLOYPATH=/home/$(whoami)/public_html/

    # 2. Copy the built assets from the dist folder to the web root
    # Note: Ensure you run 'npm run build' and commit the 'dist' folder before pushing
    - /bin/cp -R dist/* $DEPLOYPATH

    # 3. Ensure the .htaccess file is correctly placed
    - /bin/cp dist/.htaccess $DEPLOYPATH.htaccess

    # 4. Optional: Log the deployment time
    - echo "Deployment completed at $(date)" >> $DEPLOYPATH/deploy_log.txt